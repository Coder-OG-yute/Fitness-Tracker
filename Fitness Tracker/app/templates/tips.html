{% extends "base.html" %}
{% block content %}
<!-- tips page: search by keyword, filter by diet/exercise, random tip; tips loaded from database via API -->
<h1>Fitness Tips</h1>

<!--
This page demonstrates the tips functionality with search and category filtering.
All tips are stored in the database and can be searched or filtered.
-->

<div class="form-group">
    <label for="searchKeyword">Search Tips:</label>
    <input type="text" id="searchKeyword" placeholder="Enter keyword...">
    <button onclick="searchTips()">Search</button>
</div>
<!-- category buttons: diet/exercise filter or random tip; fetch /tips/category/<cat> or /tips/random -->
<div class="form-group">
    <label>Filter by Category:</label>
    <button onclick="filterByCategory('diet')">Diet Tips</button>
    <button onclick="filterByCategory('exercise')">Exercise Tips</button>
    <button onclick="getRandomTip()">Random Tip</button>
</div>
<!-- tipBox: placeholder until user clicks a button; then shows one tip or list of tips from API -->
<div id="tipBox">
    <p>Use the buttons above to view tips.</p>
</div>

<script>
// Function to fetch and display a random tip.
function getRandomTip() {
    fetch('/tips/random')
        .then(response => response.json())
        .then(data => {
            const tipBox = document.getElementById('tipBox');
            tipBox.innerHTML = `
                <div class="card">
                    <h3>${data.title}</h3>
                    <p><strong>Category:</strong> ${data.category}</p>
                    <p>${data.content}</p>
                    <p><em>Source: ${data.source}</em></p>
                </div>
            `;
        })
        .catch(error => {
            document.getElementById('tipBox').innerHTML = '<p>Error loading tip.</p>';
        });
}

// searchTips: get keyword from input, fetch /tips/search?keyword=, display results in tipBox or "No tips found"
function searchTips() {
    const keyword = document.getElementById('searchKeyword').value.trim();
    if (!keyword) {
        alert('Please enter a keyword to search.');
        return;
    }

    fetch(`/tips/search?keyword=${encodeURIComponent(keyword)}`)
        .then(response => response.json())
        .then(data => {
            const tipBox = document.getElementById('tipBox');
            if (data.length === 0) {
                tipBox.innerHTML = '<p>No tips found matching your search.</p>';
                return;
            }

            let html = '<h2>Search Results:</h2>';
            data.forEach(tip => {
                html += `
                    <div class="card">
                        <h3>${tip.title}</h3>
                        <p><strong>Category:</strong> ${tip.category}</p>
                        <p>${tip.content}</p>
                        <p><em>Source: ${tip.source}</em></p>
                    </div>
                `;
            });
            tipBox.innerHTML = html;
        })
        .catch(error => {
            document.getElementById('tipBox').innerHTML = '<p>Error searching tips.</p>';
        });
}

// Function to filter tips by category.
function filterByCategory(category) {
    fetch(`/tips/category/${category}`)
        .then(response => response.json())
        .then(data => {
            const tipBox = document.getElementById('tipBox');
            if (data.length === 0) {
                tipBox.innerHTML = `<p>No ${category} tips found.</p>`;
                return;
            }

            let html = `<h2>${category.charAt(0).toUpperCase() + category.slice(1)} Tips:</h2>`;
            data.forEach(tip => {
                html += `
                    <div class="card">
                        <h3>${tip.title}</h3>
                        <p>${tip.content}</p>
                        <p><em>Source: ${tip.source}</em></p>
                    </div>
                `;
            });
            tipBox.innerHTML = html;
        })
        .catch(error => {
            document.getElementById('tipBox').innerHTML = '<p>Error loading tips.</p>';
        });
}

// enter key in search input triggers searchTips()
document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        searchTips();
    }
});
</script>
{% endblock %}
