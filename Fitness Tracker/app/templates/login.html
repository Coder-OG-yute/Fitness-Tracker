{% extends "base.html" %}
{% block content %}
<!-- login page: form for username and password; posts to auth login route -->
<h1>Login</h1>

<!-- form for existing users: username and password; submit posts to login -->
<form method="POST">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
    <br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    <br>

    <button type="submit">Login</button>
</form>

<!-- link to signup page if user does not have an account -->
<p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up here</a>.</p>
{% endblock %}
