{% extends "base.html" %}
{% block content %}
<!-- signup page: form for username, email and password; posts to auth signup route -->
<h1>Sign Up</h1>

<!-- form for creating a new account; validation.js checks password and confirm match -->
<form method="POST">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
    <br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    <br>

    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
    <br>

    <button type="submit">Create Account</button>
</form>

<!-- link to login page if user already has an account -->
<p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>.</p>
{% endblock %}
