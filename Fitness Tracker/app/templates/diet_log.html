{% extends "base.html" %}
{% block content %}
<!-- diet log page: form for food name and mass in grams; backend uses FatSecret API for calories and protein -->
<h1>Log Food</h1>

<!-- This form lets the user type the name of a food and how many grams they ate.; POST sends to diet log route which calls FatSecret API -->
<form method="POST">
    <label for="foodName">Food name:</label>
    <input type="text" id="foodName" name="foodName" required>
    <br>
    <label for="mass">Mass (in grams):</label>
    <input type="number" step="1" id="mass" name="mass" min="1" required>
    <br>
    <label for="date">Date:</label>
    <input type="date" id="date" name="date" min="1900-01-01" max="2200-12-31" required>
    <button type="button" onclick="setToday('date')" style="margin-left: 10px;">Today</button>
    <br>
    <button type="submit">Save Food</button>
</form>
{% endblock %}
