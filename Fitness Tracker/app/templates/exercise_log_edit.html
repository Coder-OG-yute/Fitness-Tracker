{% extends "base.html" %}
{% block content %}
<!-- exercise log edit page: form to update date, sets, reps, weight, duration for an existing exercise log entry -->
<h1>Edit Exercise Log</h1>
<form method="POST" action="{{ url_for('exercise.edit_exercise_log', log_id=log_id) }}">
    <!-- exercise name is read-only; backend recalculates calories from updated sets/reps/weight/duration -->
    <p><strong>Exercise:</strong> {{ log.exerciseName }}</p>
    <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" value="{{ log.date }}" min="1900-01-01" max="2200-12-31" required>
        <button type="button" onclick="setToday('date')" style="margin-left: 10px;">Today</button>
    </div>
    <div class="form-group">
        <label for="sets">Sets:</label>
        <input type="number" id="sets" name="sets" min="0" value="{{ log.sets or '' }}">
    </div>
    <div class="form-group">
        <label for="reps">Reps:</label>
        <input type="number" id="reps" name="reps" min="0" value="{{ log.reps or '' }}">
    </div>
    <div class="form-group">
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight" step="0.1" min="0" value="{{ log.weight or '' }}">
    </div>
    <div class="form-group">
        <label for="duration">Duration (min):</label>
        <input type="number" id="duration" name="duration" step="1" min="0" value="{{ log.duration or '' }}">
    </div>
    <button type="submit" class="btn">Update</button>
    <a href="{{ url_for('dashboard.calendar') }}" class="btn" style="margin-left: 10px;">Cancel</a>
</form>
<!-- back to calendar without saving -->
<p style="margin-top: 16px;"><a href="{{ url_for('dashboard.calendar') }}">Back to Calendar</a></p>
{% endblock %}
