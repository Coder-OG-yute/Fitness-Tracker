{% extends "base.html" %}
{% block content %}
<!-- analytics page: displays weight, strength, calories and protein charts; Chart.js with period filters and goal progress -->
<h1>Analytics Dashboard</h1>

<!--
This page displays various charts showing the user's fitness progress.
We use Chart.js to create line charts and circular progress charts.
-->

<!-- Weight Chart -->
<div class="chart-container">
    <h2>Weight</h2>
    <div class="view-buttons">
        <button class="view-period-btn" data-period="daily" data-chart="weight">Daily</button>
        <button class="view-period-btn active" data-period="weekly" data-chart="weight">Weekly</button>
        <button class="view-period-btn" data-period="monthly" data-chart="weight">Monthly</button>
        <button class="view-period-btn" data-period="yearly" data-chart="weight">Yearly</button>
    </div>
    <div class="chart-scroll">
        <canvas id="weightChart" width="400" height="200"></canvas>
    </div>
</div>

<!-- Goal Progress with Circular Chart (no period filter) -->
<div class="chart-container">
    <h2>Goal Progress</h2>
    <div id="goalsCircularContainer" style="display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0;">
        <!-- Circular progress charts will be generated here -->
    </div>
    <canvas id="goalsChart" width="400" height="200" style="display: none;"></canvas>
</div>

<!-- strength chart: select exercise dropdown then line chart of weight/reps over time; /analytics/strength -->
<div class="chart-container">
    <h2>Strength Progression</h2>
    <p>
        <label for="strengthExerciseSelect">Select exercise:</label>
        <select id="strengthExerciseSelect">
            <option value="">All exercises</option>
        </select>
    </p>
    <div class="view-buttons">
        <button class="view-period-btn" data-period="daily" data-chart="strength">Daily</button>
        <button class="view-period-btn active" data-period="weekly" data-chart="strength">Weekly</button>
        <button class="view-period-btn" data-period="monthly" data-chart="strength">Monthly</button>
        <button class="view-period-btn" data-period="yearly" data-chart="strength">Yearly</button>
    </div>
    <div class="chart-scroll">
        <canvas id="strengthChart" width="400" height="200"></canvas>
    </div>
</div>

<!-- calories chart: intake over period; /analytics/calories?period= -->
<div class="chart-container">
    <h2>Calorie Intake</h2>
    <div class="view-buttons">
        <button class="view-period-btn" data-period="daily" data-chart="calories">Daily</button>
        <button class="view-period-btn active" data-period="weekly" data-chart="calories">Weekly</button>
        <button class="view-period-btn" data-period="monthly" data-chart="calories">Monthly</button>
        <button class="view-period-btn" data-period="yearly" data-chart="calories">Yearly</button>
    </div>
    <div class="chart-scroll">
        <canvas id="caloriesChart" width="400" height="200"></canvas>
    </div>
</div>

<!-- protein chart: intake over period; /analytics/protein?period= -->
<div class="chart-container">
    <h2>Protein Intake</h2>
    <div class="view-buttons">
        <button class="view-period-btn" data-period="daily" data-chart="protein">Daily</button>
        <button class="view-period-btn active" data-period="weekly" data-chart="protein">Weekly</button>
        <button class="view-period-btn" data-period="monthly" data-chart="protein">Monthly</button>
        <button class="view-period-btn" data-period="yearly" data-chart="protein">Yearly</button>
    </div>
    <div class="chart-scroll">
        <canvas id="proteinChart" width="400" height="200"></canvas>
    </div>
</div>

<style>
.view-buttons {
    margin: 10px 0;
    display: flex;
    gap: 10px;
}

.view-period-btn {
    padding: 6px 12px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
}

.view-period-btn.active {
    background: #0b3dff;
    color: white;
    border-color: #0b3dff;
}

.chart-scroll {
    overflow-x: auto;
    margin: 10px 0;
}
.chart-scroll canvas {
    min-width: 400px;
}

/* 
    Circular Progress Chart Styles
    Source: https://codepen.io/dianastanciu/pen/bGbwVNr
    
    EDITS MADE:
    1. Removed SCSS variables ($stroke-dasharray-1, $stroke-dasharray-2, $stroke-dasharray-3)
       and converted to standard CSS with hardcoded values
    2. Removed @keyframes animations (dash-1, dash-2, dash-3) - progress is now set dynamically via JavaScript
    3. Simplified .circular-progress-container to inline-block display for multiple goal charts
    4. Changed .info positioning from translate(50%, -50%) to translate(-50%, -50%) for better centering
    5. Modified .info__top and .info__bottom colors from white/dark to #333/#666 for better contrast on white background
    6. Removed fixed animation-based progress - now calculated dynamically based on goal progress percentage
    7. Added .circular-progress class wrapper for better organization
    
    WHY: The original template used SCSS and fixed animations for demo purposes. We needed
    dynamic progress calculation based on actual goal data from our database, so we removed
    the animations and implemented JavaScript-based stroke-dashoffset calculation. We also
    adapted colors to work with our white background theme instead of the original dark theme.
*/
.circular-progress-container {
    display: inline-block;
    margin: 10px;
}

.circular-progress {
    position: relative;
    width: 150px;
    height: 150px;
}

.circular-progress svg {
    transform: rotate(-90deg);
}

.circular-progress .line {
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
}

.circular-progress .line-shadow {
    stroke: rgba(0,0,0,.3);
}

.circular-progress .info {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.circular-progress .info__top {
    color: #333;
    font-size: 1.5em;
    font-weight: bold;
    display: block;
}

.circular-progress .info__bottom {
    color: #666;
    font-size: 0.8em;
    display: block;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
