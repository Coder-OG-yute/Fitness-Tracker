{% extends "base.html" %}
{% block content %}
<!-- diet log edit page: form to update food name, mass and date for an existing diet log entry -->
<h1>Edit Diet Log</h1>
<form method="POST" action="{{ url_for('diet.edit_diet_log', log_id=log_id) }}">
    <div class="form-group">
        <label for="foodName">Food name:</label>
        <input type="text" id="foodName" name="foodName" value="{{ log.foodName }}" required>
    </div>
    <div class="form-group">
        <label for="mass">Mass (g):</label>
        <input type="number" id="mass" name="mass" step="0.1" min="0.1" value="{{ log.mass }}" required>
    </div>
    <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" value="{{ log.date }}" min="1900-01-01" max="2200-12-31" required>
        <button type="button" onclick="setToday('date')" style="margin-left: 10px;">Today</button>
    </div>
    <button type="submit" class="btn">Update</button>
    <a href="{{ url_for('dashboard.calendar') }}" class="btn" style="margin-left: 10px;">Cancel</a>
</form>
<!-- back to calendar without saving -->
<p style="margin-top: 16px;"><a href="{{ url_for('dashboard.calendar') }}">Back to Calendar</a></p>
{% endblock %}
